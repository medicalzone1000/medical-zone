backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "المنتجات"
    files:
      - name: "products_list"
        label: "قائمة المنتجات"
        file: "content/products.json"
        fields:
          - name: "products"
            label: "المنتجات"
            widget: "list"
            fields:
              - { label: "الكود", name: "id", widget: "string", hint: "مثال: p001 — يجب أن يكون فريداً" }
              - { label: "اسم المنتج", name: "title", widget: "string" }
              - label: "الفئة"
                name: "category"
                widget: "select"
                options:
                  - "أجهزة تنفس"
                  - "أجهزة ضغط"
                  - "أجهزة قياس"
                  - "تجهيز عيادات"
                  - "سماعات"
                  - "إسعافات أولية"
                  - "أثاث طبي"
                  - "مستهلكات"
                  - "تجهيز معامل"
              - { label: "صورة المنتج", name: "image", widget: "image" }
              - { label: "السعر (جنيه)", name: "price", widget: "number" }
            - { label: "السعر القديم (0 إن لم يكن هناك خصم)", name: "oldPrice", widget: "number", default: 0 }
              - label: "الحالة"
                name: "status"
                widget: "select"
                options:
                  - "جديد"
                  - "مستعمل"
                  - "إيجار"
              - label: "شارة"
                name: "badge"
                widget: "select"
                options:
                  - { label: "بدون شارة", value: "" }
                  - { label: "جديد", value: "new" }
                  - { label: "خصم", value: "discount" }
              - { label: "نسبة الخصم % (اتركها 0 إن لم يكن هناك خصم)", name: "discount", widget: "number", default: 0 }
              - { label: "وصف المنتج", name: "description", widget: "text" }
              - { label: "تاريخ الإضافة", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
