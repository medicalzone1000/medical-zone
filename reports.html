<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير الطبية — ميديكال زون</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="announcement-bar">
        <p>🚚 شحن مجاني للطلبات فوق 2000 جنيه &nbsp;|&nbsp; ✅ ضمان سنة على جميع الأجهزة &nbsp;|&nbsp; 📞 دعم فني 24/7</p>
    </div>

    <header class="site-header" id="site-header">
        <div class="header-inner container">
            <div class="header-logo">
                <a href="index.html" class="logo-link">
                    <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
                    <div class="logo-text">
                        <span class="logo-main">MEDICAL</span>
                        <span class="logo-sub">ZONE</span>
                    </div>
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="store.html">المتجر</a></li>
                    <li><a href="maintenance.html">صيانة</a></li>
                    <li><a href="reports.html" class="active">تقارير</a></li>
                    <li><a href="contact.html">تواصل معنا</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="icon-btn" aria-label="بحث"><i class="fas fa-search"></i></button>
                <button class="icon-btn" aria-label="المفضلة"><i class="far fa-heart"></i></button>
                <button class="icon-btn cart-btn" aria-label="السلة">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-badge">2</span>
                </button>
                <a href="#" class="btn-outline-sm">دخول</a>
            </div>
        </div>
    </header>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="mobile-drawer" id="mobileDrawer">
        <button class="drawer-close" id="drawerClose"><i class="fas fa-times"></i></button>
        <nav class="drawer-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="store.html"><i class="fas fa-store"></i> المتجر</a></li>
                <li><a href="maintenance.html"><i class="fas fa-tools"></i> صيانة</a></li>
                <li><a href="reports.html" class="active"><i class="fas fa-file-medical"></i> تقارير</a></li>
                <li><a href="contact.html"><i class="fas fa-envelope"></i> تواصل معنا</a></li>
            </ul>
        </nav>
    </div>

    <!-- Page Hero ... (مختصر) -->
    <section class="reports-hero">...</section>
    <div class="reports-filter-bar">...</div>

    <main class="reports-main">
        <div class="container">
            <div class="reports-layout">
                <div class="reports-content">
                    <div class="reports-grid" id="dynamicReportsGrid">
                        <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
                    </div>
                </div>
                <aside class="reports-sidebar">
                    <!-- نفس الwidgets القديمة بدون محتوى ثابت للتقارير -->
                </aside>
            </div>
        </div>
    </main>

    <footer>...</footer>

    <script>
        // Sticky header, mobile drawer (نفس الكود)
        // Load reports from empty reports.json
        async function loadReports() {
            const grid = document.getElementById('dynamicReportsGrid');
            try {
                const res = await fetch('./content/reports.json?v=' + Date.now());
                const data = await res.json();
                const reports = (data.reports || []).sort((a,b)=>new Date(b.date)-new Date(a.date));
                if (reports.length === 0) {
                    grid.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1">لا توجد تقارير حالياً</p>';
                    return;
                }
                grid.innerHTML = reports.map(r => `<article class="report-card">...</article>`).join('');
            } catch(e) {
                grid.innerHTML = '<p style="text-align:center;color:#999">تعذر تحميل التقارير</p>';
            }
        }
        loadReports();
    </script>
</body>
</html>
